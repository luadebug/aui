name: 00-Build Conanfile

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches: [ master, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GIT_SUBMODULE_STRATEGY: recursive

permissions:
  contents: write

jobs:
  test-on-msvc:
    strategy:
      fail-fast: false
      matrix:
        toolset: [142, 143]
        cppstd: ['20']
        build-type: [Debug, Release]
        exclude:
          - toolset: 142
            cppstd: '23'
        include:
          - toolset: 142
            conan-compiler-version: 192
          - toolset: 143
            conan-compiler-version: 194
          - build-type: Debug
            cmake-preset: conan-debug
          - build-type: Release
            cmake-preset: conan-release

    name: MSVC ${{ matrix.toolset }} - C++${{ matrix.cppstd }} - ${{ matrix.build-type }}
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4


      - name: Install VS 2019 Build Tools
        shell: powershell
        if: matrix.toolset == 142
        run: |
          Invoke-WebRequest -UseBasicParsing -Uri https://aka.ms/vs/16/release/vs_buildtools.exe -OutFile C:\vs_buildtools.exe
          Start-Process -Wait -FilePath "C:\vs_buildtools.exe" -ArgumentList "--passive","--wait","--norestart","--nocache","--installPath","C:\BuildTools","--add","Microsoft.VisualStudio.Component.VC.v142.x86.x64","--add","Microsoft.VisualStudio.Component.Windows10SDK.19041"

      - name: Install VS 2022 Build Tools
        shell: powershell
        if: matrix.toolset == 143
        run: |
          Invoke-WebRequest -UseBasicParsing -Uri https://aka.ms/vs/17/release/vs_buildtools.exe -OutFile C:\vs_buildtools.exe
          Start-Process -Wait -FilePath "C:\vs_buildtools.exe" -ArgumentList "--passive","--wait","--norestart","--nocache","--installPath","C:\BuildTools","--add","Microsoft.VisualStudio.Component.VC.v143.x86.x64","--add","Microsoft.VisualStudio.Component.Windows10SDK.26100"


      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install Conan
        uses: turtlebrowser/get-conan@main

      - name: Use installed MSVC environment
        shell: powershell
        run: |
          Write-Host "Listing C:\\BuildTools and C:\\ for diagnostics:"
          Get-ChildItem C:\\BuildTools
          Get-ChildItem C:\
          if (Test-Path "C:\\BuildTools\\VC\\Auxiliary\\Build\\vcvarsall.bat") {
            Write-Host "Found vcvarsall.bat, using it."
            cmd /c '"C:\\BuildTools\\VC\\Auxiliary\\Build\\vcvarsall.bat" amd64 && conan --version && conan profile detect'
          } elseif (Test-Path "C:\\BuildTools\\Common7\\Tools\\VsDevCmd.bat") {
            Write-Host "vcvarsall.bat not found, trying VsDevCmd.bat."
            cmd /c '"C:\\BuildTools\\Common7\\Tools\\VsDevCmd.bat" -arch=amd64 && conan --version && conan profile detect'
          } else {
            Write-Host "Neither vcvarsall.bat nor VsDevCmd.bat found!"
            exit 1
          }

      - name: Install dependencies
        run: >
          conan install .
          -c tools.microsoft.msbuild:vs_version=17
          -s compiler.version=${{ matrix.conan-compiler-version }}
          -s compiler.cppstd=${{ matrix.cppstd }}
          -s build_type=${{ matrix.build-type }}
          --build=missing

      - name: CMake Configure
        run: |
          cmake --list-presets
          cmake --preset conan-default

      - name: Build
        run: |
          cmake --build --list-presets
          cmake --build --preset ${{ matrix.cmake-preset }}

      - name: Test
        run: |
          ctest --list-presets
          ctest --preset ${{ matrix.cmake-preset }}

  test-on-clang:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        cppstd: ['20']
        build-type: [Debug, Release]
        include:
          - os: ubuntu-latest
            clang-version: 20
          - build-type: Debug
            cmake-preset: conan-debug
          - build-type: Release
            cmake-preset: conan-release

    name: Clang ${{ matrix.clang-version }} - C++${{ matrix.cppstd }} - ${{ matrix.build-type }}
    runs-on: ${{ matrix.os }}
    container:
      image: ubuntu:25.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-wheel python3-setuptools wget lsb-release software-properties-common gnupg pipx cmake git \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libx11-xcb-dev libfontenc-dev libice-dev libsm-dev libxau-dev libxaw7-dev \
            libxcomposite-dev libxcursor-dev libxdamage-dev libxext-dev libxfixes-dev libxi-dev libxinerama-dev \
            libxkbfile-dev libxmu-dev libxmuu-dev libxpm-dev libxrandr-dev libxrender-dev libxres-dev libxss-dev \
            libxt-dev libxtst-dev libxv-dev libxxf86vm-dev libxcb-glx0-dev libxcb-render0-dev libxcb-render-util0-dev \
            libxcb-xkb-dev libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-shape0-dev \
            libxcb-sync-dev libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-dri3-dev uuid-dev libxcb-cursor-dev \
            libxcb-dri2-0-dev libxcb-present-dev libxcb-composite0-dev libxcb-ewmh-dev libxcb-res0-dev \
            libxcb-util-dev libxcb-util0-dev libdbus-1-dev libglib2.0-dev libfontconfig1-dev libpulse-dev libglew-dev

      - name: Install Clang 20
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          ./llvm.sh 20 all

      - name: Symlink clang and clang++
        run: |
          ln -sf /usr/bin/clang-20 /usr/bin/clang
          ln -sf /usr/bin/clang++-20 /usr/bin/clang++

      - name: Symlink llvm-strip
        run: |
          ln -sf /usr/bin/llvm-strip-20 /usr/bin/strip

      - name: Set Clang as default compiler
        run: |
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

      - name: Install Conan
        run: |
          pipx ensurepath
          pipx install conan

      - name: Add pipx bin to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Conan
        run: |
          conan --version
          conan profile detect

      - name: Install dependencies
        run: >
          conan install . \
            -s compiler=clang \
            -s compiler.version=${{ matrix.clang-version }} \
            -s compiler.cppstd=${{ matrix.cppstd }} \
            -s build_type=${{ matrix.build-type }} \
            --build=missing

      - name: CMake Configure
        run: |
          cmake --list-presets
          cmake --preset ${{ matrix.cmake-preset }}

      - name: Build
        run: |
          cmake --build --list-presets
          cmake --build --preset ${{ matrix.cmake-preset }}

      - name: Test
        run: |
          ctest --list-presets
          ctest --preset ${{ matrix.cmake-preset }}

  test-on-gcc:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        cppstd: ['20']
        build-type: [Debug, Release]
        include:
          - os: ubuntu-latest
            gcc-version: 15
          - build-type: Debug
            cmake-preset: conan-debug
          - build-type: Release
            cmake-preset: conan-release

    name: GCC ${{ matrix.gcc-version }} - C++${{ matrix.cppstd }} - ${{ matrix.build-type }}
    runs-on: ${{ matrix.os }}
    container:
      image: ubuntu:25.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-wheel python3-setuptools wget lsb-release software-properties-common gnupg pipx cmake git \
            gcc-15 g++-15 \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libx11-xcb-dev libfontenc-dev libice-dev libsm-dev libxau-dev libxaw7-dev \
            libxcomposite-dev libxcursor-dev libxdamage-dev libxext-dev libxfixes-dev libxi-dev libxinerama-dev \
            libxkbfile-dev libxmu-dev libxmuu-dev libxpm-dev libxrandr-dev libxrender-dev libxres-dev libxss-dev \
            libxt-dev libxtst-dev libxv-dev libxxf86vm-dev libxcb-glx0-dev libxcb-render0-dev libxcb-render-util0-dev \
            libxcb-xkb-dev libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-shape0-dev \
            libxcb-sync-dev libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-dri3-dev uuid-dev libxcb-cursor-dev \
            libxcb-dri2-0-dev libxcb-present-dev libxcb-composite0-dev libxcb-ewmh-dev libxcb-res0-dev \
            libxcb-util-dev libxcb-util0-dev libdbus-1-dev libglib2.0-dev libfontconfig1-dev libpulse-dev libglew-dev

      - name: Symlink gcc and g++
        run: |
          ln -sf /usr/bin/gcc-15 /usr/bin/gcc
          ln -sf /usr/bin/g++-15 /usr/bin/g++

      - name: Set GCC as default compiler
        run: |
          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV

      - name: Install Conan
        run: |
          pipx ensurepath
          pipx install conan

      - name: Add pipx bin to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Conan
        run: |
          conan --version
          conan profile detect

      - name: Install dependencies
        run: >
          conan install . \
            -s compiler=gcc \
            -s compiler.version=${{ matrix.gcc-version }} \
            -s compiler.cppstd=${{ matrix.cppstd }} \
            -s build_type=${{ matrix.build-type }} \
            --build=missing

      - name: CMake Configure
        run: |
          cmake --list-presets
          cmake --preset ${{ matrix.cmake-preset }}

      - name: Build
        run: |
          cmake --build --list-presets
          cmake --build --preset ${{ matrix.cmake-preset }}

      - name: Test
        run: |
          ctest --list-presets
          ctest --preset ${{ matrix.cmake-preset }}

  test-on-appleclang:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14]
        cppstd: ['20']
        build-type: [Debug, Release]
        arch: ['x86_64', 'armv8']
        include:
          - os: macos-14
            appleclang-version: 15
          - build-type: Debug
            cmake-preset: conan-debug
          - build-type: Release
            cmake-preset: conan-release

    name: AppleClang ${{ matrix.appleclang-version }} ${{ matrix.arch }} - C++${{ matrix.cppstd }} - ${{ matrix.build-type }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install Xcode 15.4.0
        if: matrix.appleclang-version == 15
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: '15.4.0'

      - name: Install system dependencies
        run: |
          brew update
          brew install git python3 conan

      - name: Setup Conan
        run: |
          conan --version
          conan profile detect

      - name: Install dependencies
        run: >
          conan install . \
            -s compiler=apple-clang \
            -s compiler.version=${{ matrix.appleclang-version }} \
            -s compiler.cppstd=${{ matrix.cppstd }} \
            -s arch=${{ matrix.arch }} \
            -s build_type=${{ matrix.build-type }} \
            --build=missing

      - name: CMake Configure
        run: |
          cmake --list-presets
          cmake --preset ${{ matrix.cmake-preset }}

      - name: Build
        run: |
          cmake --build --list-presets
          cmake --build --preset ${{ matrix.cmake-preset }}

      - name: Test
        run: |
          ctest --list-presets
          ctest --preset ${{ matrix.cmake-preset }}
