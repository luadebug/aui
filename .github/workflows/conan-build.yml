name: 00-Build Conanfile

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches: [ master, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GIT_SUBMODULE_STRATEGY: recursive

permissions:
  contents: write

jobs:
  test-on-msvc:
    strategy:
      fail-fast: false
      matrix:
        toolset: [142, 143]
        cppstd: ['20']
        build-type: [Debug, Release]
        exclude:
          - toolset: 142
            cppstd: '23'
        include:
          - toolset: 142
            conan-compiler-version: 192
          - toolset: 143
            conan-compiler-version: 194
          - build-type: Debug
            cmake-preset: conan-debug
          - build-type: Release
            cmake-preset: conan-release

    name: MSVC ${{ matrix.toolset }} - C++${{ matrix.cppstd }} - ${{ matrix.build-type }}
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - name: Install Conan
        uses: turtlebrowser/get-conan@main

      - name: Setup Conan
        run: |
          conan --version
          conan profile detect

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install dependencies
        run: >
          conan install .
          -c tools.microsoft.msbuild:vs_version=17
          -s compiler.version=${{ matrix.conan-compiler-version }}
          -s compiler.cppstd=${{ matrix.cppstd }}
          -s build_type=${{ matrix.build-type }}
          --build=missing

      - name: CMake Configure
        run: |
          cmake --list-presets
          cmake --preset conan-default

      - name: Build
        run: |
          cmake --build --list-presets
          cmake --build --preset ${{ matrix.cmake-preset }}

      - name: Test
        run: |
          ctest --list-presets
          ctest --preset ${{ matrix.cmake-preset }}

  test-on-clang:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        cppstd: ['20']
        build-type: [Debug, Release]
        include:
          - os: ubuntu-latest
            clang-version: 20
          - build-type: Debug
            cmake-preset: conan-debug
          - build-type: Release
            cmake-preset: conan-release

    name: Clang ${{ matrix.clang-version }} - C++${{ matrix.cppstd }} - ${{ matrix.build-type }}
    runs-on: ${{ matrix.os }}
    container:
      image: ubuntu:25.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-wheel python3-setuptools wget lsb-release software-properties-common gnupg pipx \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libx11-xcb-dev libfontenc-dev libice-dev libsm-dev libxau-dev libxaw7-dev \
            libxcomposite-dev libxcursor-dev libxdamage-dev libxext-dev libxfixes-dev libxi-dev libxinerama-dev \
            libxkbfile-dev libxmu-dev libxmuu-dev libxpm-dev libxrandr-dev libxrender-dev libxres-dev libxss-dev \
            libxt-dev libxtst-dev libxv-dev libxxf86vm-dev libxcb-glx0-dev libxcb-render0-dev libxcb-render-util0-dev \
            libxcb-xkb-dev libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-shape0-dev \
            libxcb-sync-dev libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-dri3-dev uuid-dev libxcb-cursor-dev \
            libxcb-dri2-0-dev libxcb-present-dev libxcb-composite0-dev libxcb-ewmh-dev libxcb-res0-dev \
            libxcb-util-dev libxcb-util0-dev libdbus-1-dev libglib2.0-dev libfontconfig1-dev libpulse-dev libglew-dev

      - name: Clang Toolchain Installation
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          ./llvm.sh 20 all

      - name: Set Clang as default compiler
        run: |
          echo "CC=clang-20" >> $GITHUB_ENV
          echo "CXX=clang++-20" >> $GITHUB_ENV

      - name: Install Conan
        run: |
          pipx ensurepath
          pipx install conan

      - name: Setup Conan
        run: |
          conan --version
          conan profile detect

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install dependencies
        run: >
          conan install . \
            -s compiler=clang \
            -s compiler.version=${{ matrix.clang-version }} \
            -s compiler.cppstd=${{ matrix.cppstd }} \
            -s build_type=${{ matrix.build-type }} \
            --build=missing

      - name: CMake Configure
        run: |
          cmake --list-presets
          cmake --preset ${{ matrix.cmake-preset }}

      - name: Build
        run: |
          cmake --build --list-presets
          cmake --build --preset ${{ matrix.cmake-preset }}

      - name: Test
        run: |
          ctest --list-presets
          ctest --preset ${{ matrix.cmake-preset }}

  test-on-gcc:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        cppstd: ['20']
        build-type: [Debug, Release]
        include:
          - os: ubuntu-latest
            gcc-version: 15
          - build-type: Debug
            cmake-preset: conan-debug
          - build-type: Release
            cmake-preset: conan-release

    name: GCC ${{ matrix.gcc-version }} - C++${{ matrix.cppstd }} - ${{ matrix.build-type }}
    runs-on: ${{ matrix.os }}
    container:
      image: ubuntu:25.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-wheel python3-setuptools wget lsb-release software-properties-common gnupg pipx \
            gcc-15 g++-15 \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libx11-xcb-dev libfontenc-dev libice-dev libsm-dev libxau-dev libxaw7-dev \
            libxcomposite-dev libxcursor-dev libxdamage-dev libxext-dev libxfixes-dev libxi-dev libxinerama-dev \
            libxkbfile-dev libxmu-dev libxmuu-dev libxpm-dev libxrandr-dev libxrender-dev libxres-dev libxss-dev \
            libxt-dev libxtst-dev libxv-dev libxxf86vm-dev libxcb-glx0-dev libxcb-render0-dev libxcb-render-util0-dev \
            libxcb-xkb-dev libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-shape0-dev \
            libxcb-sync-dev libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-dri3-dev uuid-dev libxcb-cursor-dev \
            libxcb-dri2-0-dev libxcb-present-dev libxcb-composite0-dev libxcb-ewmh-dev libxcb-res0-dev \
            libxcb-util-dev libxcb-util0-dev libdbus-1-dev libglib2.0-dev libfontconfig1-dev libpulse-dev libglew-dev

      - name: Set GCC as default compiler
        run: |
          echo "CC=gcc-15" >> $GITHUB_ENV
          echo "CXX=g++-15" >> $GITHUB_ENV

      - name: Install Conan
        run: |
          pipx ensurepath
          pipx install conan

      - name: Setup Conan
        run: |
          conan --version
          conan profile detect

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install dependencies
        run: >
          conan install . \
            -s compiler=gcc \
            -s compiler.version=${{ matrix.gcc-version }} \
            -s compiler.cppstd=${{ matrix.cppstd }} \
            -s build_type=${{ matrix.build-type }} \
            --build=missing

      - name: CMake Configure
        run: |
          cmake --list-presets
          cmake --preset ${{ matrix.cmake-preset }}

      - name: Build
        run: |
          cmake --build --list-presets
          cmake --build --preset ${{ matrix.cmake-preset }}

      - name: Test
        run: |
          ctest --list-presets
          ctest --preset ${{ matrix.cmake-preset }}
